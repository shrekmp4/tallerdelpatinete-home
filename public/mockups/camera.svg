<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#e7e7eb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a3e635"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1200" height="800" rx="56" fill="url(#bg)"/>
  <circle cx="950" cy="160" r="180" fill="url(#accent)" opacity="0.14"/>
  <circle cx="260" cy="680" r="260" fill="#0a0a0a" opacity="0.05"/>

  <g transform="translate(210 210)" filter="url(#shadow)">
    <rect x="0" y="40" width="780" height="360" rx="48" fill="#ffffff"/>
    <rect x="110" y="0" width="260" height="120" rx="34" fill="#ffffff"/>
    <rect x="140" y="24" width="200" height="72" rx="28" fill="#f4f4f5"/>

    <rect x="70" y="122" width="640" height="240" rx="40" fill="#f8fafc"/>

    <circle cx="430" cy="240" r="118" fill="#111827" opacity="0.92"/>
    <circle cx="430" cy="240" r="86" fill="#0f172a"/>
    <circle cx="430" cy="240" r="56" fill="#111827"/>
    <circle cx="470" cy="206" r="16" fill="#a3e635" opacity="0.65"/>
    <circle cx="390" cy="278" r="10" fill="#ffffff" opacity="0.18"/>

    <circle cx="640" cy="170" r="16" fill="#111827" opacity="0.22"/>
    <circle cx="640" cy="170" r="7" fill="#a3e635" opacity="0.7"/>
  </g>
</svg>

